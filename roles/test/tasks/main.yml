- name: Esperar que el servicio levante
  wait_for:
    port:    3000          # ajusta al puerto de tu app
    host:    "{{ ansible_host }}"
    timeout: 30

- name: Healthcheck HTTP
  uri:
    url:            "http://{{ ansible_host }}:3000/health"
    method:         GET
    status_code:    200
    timeout:        10
  register: health_result
  retries: 3
  delay:   5
  until:   health_result.status == 200

- name: Correr tests unitarios
  command: npm run build
  args:
    chdir: "{{ app_dir }}/express-health-app"
  register: test_result
  ignore_errors: yes        # capturamos el error manualmente

- name: Notificar fallo en Slack y abortar
  include_role:
    name: notify
  vars:
    slack_status:  "failure"
    slack_message: >
      ❌ *Tests fallaron en Staging* — rama: {{ app_branch }}
      ```
      {{ test_result.stderr | default(test_result.stdout) }}
      ```
  when: test_result.failed

- name: Abortar deploy si los tests fallaron
  fail:
    msg: "Tests fallaron en staging. Producción no fue actualizada."
  when: test_result.failed