- name: Deploy en Producción (Máquina A)
  hosts: production
  gather_facts: yes
  vars_files:
    - ../vault/secrets.yml
  vars:
    repo_url: "{{ bitbucket_repo }}"

  roles:
    - deploy

  post_tasks:
    - name: Notificar éxito en Slack
      include_role:
        name: notify
      vars:
        slack_status:  "success"
        slack_message: "✅ Deploy exitoso en producción — rama: {{ app_branch }}"